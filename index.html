<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Name - Bem-vindo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-md w-full bg-white shadow-2xl rounded-3xl p-8 m-4 text-center transform transition hover:scale-105 duration-300">
        
        <!-- Área do Logo -->
        <div class="mb-6">
            <!-- Substitua 'logo.png' pelo caminho real do seu arquivo -->
            <img src="public/logo.png" alt="Logo da Startup" class="mx-auto h-20 w-auto object-contain">
        </div>
        <!-- Divisor -->
        <div class="w-16 h-1 bg-blue-600 mx-auto mb-6 rounded-full"></div>

        <!-- Mensagem para o Usuário -->
        <p class="text-gray-600 text-lg leading-relaxed">
            Olá! Estamos muito felizes em ter você aqui. Prepare-se para transformar a maneira como você lida com sua infraestrutura.
        </p>

        <!-- Footer Simples -->
        <footer class="mt-10 text-gray-400 text-sm italic">
            &copy; 2026 InfraFlow. Todos os direitos reservados.
        </footer>
    </div>

</body>
</html>
